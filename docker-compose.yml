services:
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: omni_frontend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - backend
    networks:
      - omnichannel_network

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: omni_backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - app_uploads:/app/uploads
    networks:
      - omnichannel_network

  worker:
    build:
      context: .
      dockerfile: docker/worker/Dockerfile
    container_name: omni_worker
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - redis
      - backend
    networks:
      - omnichannel_network

  wa-connector:
    build:
      context: .
      dockerfile: docker/wa-connector/Dockerfile
    container_name: omni_wa_connector
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - whatsapp_sessions:/var/lib/wa-sessions
    networks:
      - omnichannel_network

  postgres:
    image: postgres:16-alpine
    container_name: omni_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - omnichannel_network

  redis:
    image: redis:7-alpine
    container_name: omni_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - omnichannel_network

  nginx:
    image: nginx:1.27-alpine
    container_name: omni_nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_certs:/etc/nginx/certs
    networks:
      - omnichannel_network

volumes:
  postgres_data:
  redis_data:
  whatsapp_sessions:
  app_uploads:
  nginx_certs:

networks:
  omnichannel_network:
    driver: bridge
